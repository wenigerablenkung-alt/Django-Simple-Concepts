{% extends "lab4app/base.html" %}
{% block title %}Delete Post{% endblock %}
{% block content %}
<div class="card" style="max-width:500px; margin:3rem auto; text-align:center;">
    <div style="font-size:3rem;">🗑️</div>
    <h2>Delete Post?</h2>
    <p>Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This cannot be undone.</p>
    <div style="display:flex; gap:1rem; justify-content:center; margin-top:1.5rem;">
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
        </form>
        <a href="{% url 'post_detail' post.pk %}" class="btn btn-secondary">Cancel</a>
    </div>
</div>
{% endblock %}
